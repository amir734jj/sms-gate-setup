name: sms-gateway-proxy
services:
  backend:
    image: ghcr.io/android-sms-gateway/server:latest
    environment:
      - CONFIG_PATH=config.yml
      - DATABASE__PASSWORD=${MYSQL_PASSWORD}
      - GATEWAY__PRIVATE_TOKEN=${GATEWAY_PRIVATE_TOKEN}
      - HTTP__OPENAPI__ENABLED=${HTTP_OPENAPI_ENABLED}
      - JWT__SECRET=${JWT_SECRET}
    configs:
      - source: config-yml
        target: /app/config.yml
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: ghcr.io/android-sms-gateway/server:latest
    command: ["/app/app", "worker"]
    environment:
      - CONFIG_PATH=config.yml
      - DATABASE__PASSWORD=${MYSQL_PASSWORD}
    configs:
      - source: config-yml
        target: /app/config.yml
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:lts
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=sms
      - MYSQL_USER=sms
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

configs:
  config-yml:
    content: |
      gateway:
        mode: private
      http:
        listen: 0.0.0.0:3000
      database:
        host: db
        port: 3306
        user: sms
        password: ${DATABASE__PASSWORD}
      fcm:
        credentials_json: "{}"
        timeout_seconds: 1
        debounce_seconds: 5

volumes:
  mariadb-data:
